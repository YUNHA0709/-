<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매출 신청 · 등록비 판정</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');

:root {
  --navy:    #1a2f4a; --navy2: #243d5e;
  --blue:    #2d6cba; --blue-l:#4a8fd4;
  --ok:      #1a6e44; --ok-bg: #e8f5ee; --ok-bd: #a3d4b8;
  --warn:    #b5440a; --warn-bg:#fff3eb; --warn-bd:#f0b48a;
  --red:     #c0392b; --red-bg:#fef0ef; --red-bd:#f0a8a0;
  --if:      #6b3fa0; --if-bg: #f3eeff; --if-bd: #c9a8f0;
  --reg:     #1a5276; --reg-bg:#eaf4fb; --reg-bd:#a9cce3;
  --gray0:   #f4f6f9; --gray1: #e8ecf2; --gray2: #c8d0dc;
  --gray3:   #8a99ae; --gray4: #4a5568;
  --text:    #1e2a38; --border:#dce3ed;
  --radius:  8px;     --shadow:0 2px 12px rgba(26,47,74,.10);
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Noto Sans KR',sans-serif; font-size:13px; background:var(--gray0); color:var(--text); min-height:100vh; }

/* 헤더 */
.header { background:var(--navy); padding:14px 28px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,.18); }
.header-left { display:flex; align-items:center; gap:12px; }
.header-logo { width:34px; height:34px; border-radius:8px; background:var(--blue); display:flex; align-items:center; justify-content:center; font-size:16px; }
.header-title { color:#fff; font-size:14px; font-weight:700; }
.header-sub   { color:#7a9cc8; font-size:11px; margin-top:1px; }
.header-date  { color:#7a9cc8; font-size:11px; text-align:right; }

.wrap { max-width:780px; margin:0 auto; padding:24px 20px 60px; }

/* 카드 */
.card { background:#fff; border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:16px; overflow:hidden; }
.card-head { background:var(--navy); padding:10px 18px; display:flex; align-items:center; gap:8px; }
.card-head .icon  { font-size:14px; }
.card-head .label { color:#fff; font-size:12px; font-weight:700; letter-spacing:.3px; }
.card-body { padding:18px; }

/* 계약 정보 카드 하단 버튼 행 */
.contract-footer { display:flex; align-items:center; justify-content:space-between; margin-top:14px; flex-wrap:wrap; gap:8px; }
.contract-hint   { font-size:11px; color:var(--gray3); }

/* 그리드 */
.grid   { display:grid; gap:12px; }
.grid-2 { grid-template-columns:1fr 1fr; }
.grid-3 { grid-template-columns:1fr 1fr 1fr; }
.grid-5 { grid-template-columns:repeat(5,1fr); }
.field label { display:block; font-size:11px; font-weight:600; color:var(--gray3); margin-bottom:5px; letter-spacing:.2px; text-transform:uppercase; }
.field input,.field select { width:100%; height:38px; border:1.5px solid var(--border); border-radius:6px; padding:0 10px; font-family:inherit; font-size:13px; color:var(--text); background:#fff; transition:border-color .15s,box-shadow .15s; outline:none; -webkit-appearance:none; }
.field input:focus,.field select:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(45,108,186,.12); }
.field input.num { text-align:right; font-variant-numeric:tabular-nums; }

/* 품의 진행 */
.pui-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:14px; }
.pui-item { display:flex; flex-direction:column; align-items:center; gap:8px; padding:14px 8px 12px; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; transition:all .15s; user-select:none; background:#fff; }
.pui-item:hover   { border-color:var(--blue); background:#f5f9ff; }
.pui-item.checked { border-color:var(--ok);   background:var(--ok-bg); }
.pui-box { width:22px; height:22px; border:2px solid var(--gray2); border-radius:5px; background:#fff; transition:all .15s; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:transparent; flex-shrink:0; }
.pui-item.checked .pui-box { background:var(--ok); border-color:var(--ok); color:#fff; }
.pui-label { font-size:11px; font-weight:600; color:var(--gray4); text-align:center; }
.pui-item.checked .pui-label { color:var(--ok); }
.pui-footer { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
.pui-status { font-size:11px; color:var(--gray3); }
.pui-status.ready { color:var(--ok); font-weight:700; }

/* 판정 결과 */
.result-panel { border-radius:var(--radius); padding:16px 18px; margin-top:4px; display:none; border:1.5px solid; }
.result-panel.ok   { background:var(--ok-bg);  border-color:var(--ok-bd); }
.result-panel.over { background:var(--red-bg); border-color:var(--red-bd); }
.result-top { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.result-icon { font-size:22px; }
.result-title { font-size:13px; font-weight:700; }
.result-panel.ok   .result-title { color:var(--ok); }
.result-panel.over .result-title { color:var(--red); }
.result-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.result-item { background:rgba(255,255,255,.7); border-radius:6px; padding:10px 12px; text-align:center; }
.r-label { font-size:10px; color:var(--gray3); font-weight:600; margin-bottom:4px; }
.r-value { font-size:14px; font-weight:700; font-variant-numeric:tabular-nums; color:var(--text); }
.r-value.red { color:var(--red); }
.r-value.ok  { color:var(--ok); }

/* 컨펌 영역 */
.confirm-area { display:none; margin-top:14px; padding-top:14px; border-top:1px dashed var(--warn-bd); }
.c-label { font-size:11px; font-weight:700; color:var(--warn); margin-bottom:8px; }
.confirm-row { display:flex; gap:10px; flex-wrap:wrap; }
.confirm-row .field { flex:1; min-width:140px; }
.confirm-note { width:100%; margin-top:10px; border:1.5px solid var(--border); border-radius:6px; padding:9px 12px; font-family:inherit; font-size:13px; color:var(--text); resize:vertical; min-height:64px; outline:none; }
.confirm-note:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(45,108,186,.12); }

/* 버튼 공통 */
.btn-area { display:flex; gap:10px; margin-top:14px; justify-content:flex-end; align-items:center; }
.btn { height:42px; padding:0 22px; border:none; border-radius:7px; font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:6px; white-space:nowrap; }
.btn:disabled { opacity:.38; cursor:not-allowed; }
.btn-reset  { background:var(--gray1); color:var(--gray4); }
.btn-reset:hover  { background:var(--gray2); }
.btn-calc   { background:var(--navy);  color:#fff; }
.btn-calc:hover:not(:disabled) { background:var(--navy2); }
.btn-ok     { background:var(--ok);   color:#fff; }
.btn-ok:hover:not(:disabled)   { background:#218f58; }
.btn-over   { background:var(--red);  color:#fff; }
.btn-over:hover:not(:disabled) { background:#a93226; }

/* 소형 버튼 (IF, 계약등록) */
.btn-sm { height:36px; padding:0 16px; font-size:12px; border-radius:6px; border:1.5px solid; font-family:inherit; font-weight:700; cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:5px; white-space:nowrap; }
.btn-sm:disabled { opacity:.38; cursor:not-allowed; }
.btn-reg { background:var(--reg-bg); color:var(--reg); border-color:var(--reg-bd); }
.btn-reg:hover:not(:disabled) { background:var(--reg); color:#fff; }
.btn-if  { background:var(--if-bg);  color:var(--if);  border-color:var(--if-bd); }
.btn-if:hover:not(:disabled)  { background:var(--if);  color:#fff; }

/* 매출 신청 영역 */
.submit-area { display:none; margin-top:12px; padding-top:12px; border-top:1px solid var(--gray1); }
.submit-inner { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
.submit-guide { font-size:11px; color:var(--gray3); }
.submit-hint  { font-size:10px; color:var(--gray3); text-align:right; margin-top:5px; }

/* 자동완성 뱃지 */
.autofill-badge { display:none; font-size:10px; color:var(--ok); background:var(--ok-bg); border:1px solid var(--ok-bd); border-radius:4px; padding:2px 8px; margin-top:6px; }

/* 성공 오버레이 */
.success-overlay { display:none; position:fixed; inset:0; background:rgba(26,47,74,.55); z-index:200; align-items:center; justify-content:center; }
.success-overlay.show { display:flex; }
.success-box { background:#fff; border-radius:14px; padding:40px 36px; text-align:center; max-width:380px; width:90%; box-shadow:0 16px 48px rgba(0,0,0,.2); animation:popIn .25s ease; }
@keyframes popIn { from{transform:scale(.92);opacity:0} to{transform:scale(1);opacity:1} }
.success-icon  { font-size:46px; margin-bottom:14px; }
.success-title { font-size:17px; font-weight:700; color:var(--ok); margin-bottom:8px; }
.success-sub   { font-size:12px; color:var(--gray3); line-height:1.7; }
.success-info  { background:var(--gray0); border-radius:8px; padding:12px 16px; margin:16px 0; text-align:left; font-size:12px; color:var(--gray4); line-height:1.9; }
.success-info span { font-weight:700; color:var(--text); }
.btn-close-ok { margin-top:6px; background:var(--navy); color:#fff; border:none; border-radius:7px; padding:11px 28px; font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; }
.btn-close-ok:hover { background:var(--navy2); }

/* 안내 배너 */
.gs-notice { background:#fffbe6; border:1px solid #f0d060; border-radius:6px; padding:10px 14px; font-size:11px; color:#7a6010; margin-bottom:16px; display:flex; gap:8px; align-items:flex-start; }
.gs-notice a { color:var(--blue); text-decoration:underline; cursor:pointer; }

.sel-wrap { position:relative; }
.sel-wrap::after { content:'▾'; position:absolute; right:10px; top:50%; transform:translateY(-50%); color:var(--gray3); pointer-events:none; font-size:11px; }

@media(max-width:600px){
  .grid-2,.grid-3,.grid-5{grid-template-columns:1fr 1fr;}
  .result-grid{grid-template-columns:1fr 1fr;}
  .pui-grid{grid-template-columns:repeat(3,1fr);}
  .header{padding:12px 16px;}
  .wrap{padding:16px 12px 60px;}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo">🚗</div>
    <div>
      <div class="header-title">매출 신청 · 등록비 판정</div>
      <div class="header-sub">영업관리 전용 — 매출 요청 전 등록비 사전 확인</div>
    </div>
  </div>
  <div class="header-date" id="hdrDate"></div>
</div>

<div class="wrap">

  <div class="gs-notice" id="gsNotice">
    ⚙️ <span>구글시트 연동이 설정되지 않았습니다.
    <a onclick="showGsGuide()">연동 설정 방법 보기</a></span>
  </div>

  <!-- ① 계약 정보 -->
  <div class="card">
    <div class="card-head">
      <span class="icon">📋</span><span class="label">계약 정보</span>
    </div>
    <div class="card-body">
      <div class="grid grid-5" style="margin-bottom:12px">
        <div class="field">
          <label>계약번호</label>
          <input type="text" id="contractNo" oninput="onContractInput()">
          <div class="autofill-badge" id="autofillBadge">✅ 기존 계약 정보 불러옴</div>
        </div>
        <div class="field"><label>SC</label><input type="text" id="sc" oninput="checkContractFilled()"></div>
        <div class="field"><label>고객명</label><input type="text" id="customer" oninput="checkContractFilled()"></div>
        <div class="field" style="grid-column:span 2"><label>모델</label><input type="text" id="model" oninput="checkContractFilled()"></div>
      </div>
      <div class="grid grid-2">
        <div class="field"><label>차대번호 (VIN)</label><input type="text" id="vin" style="font-size:12px" oninput="checkContractFilled()"></div>
        <div class="field">
          <label>금융 구분</label>
          <div class="sel-wrap">
            <select id="finType" onchange="checkContractFilled()">
              <option value="">선택</option>
              <option>현금</option><option>할부</option><option>리스</option><option>렌트</option>
            </select>
          </div>
        </div>
      </div>
      <!-- 계약 정보 카드 하단 버튼 -->
      <div class="contract-footer">
        <div class="contract-hint" id="contractHint">모든 항목 입력 시 버튼이 활성화됩니다.</div>
        <div style="display:flex;gap:8px;">
          <button class="btn-sm btn-reg" id="btnReg" disabled onclick="registerContract()">💾 계약 등록</button>
          <button class="btn-sm btn-if"  id="btnIF"  disabled onclick="requestIF()">📋 IF 결재 요청</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ② 품의 진행 -->
  <div class="card">
    <div class="card-head">
      <span class="icon">📝</span><span class="label">품의 진행</span>
    </div>
    <div class="card-body">
      <div class="pui-grid">
        <div class="pui-item" id="pui1" onclick="togglePui(1)"><div class="pui-box">✓</div><div class="pui-label">① 입금</div></div>
        <div class="pui-item" id="pui2" onclick="togglePui(2)"><div class="pui-box">✓</div><div class="pui-label">② 홀세일</div></div>
        <div class="pui-item" id="pui3" onclick="togglePui(3)"><div class="pui-box">✓</div><div class="pui-label">③ PDI</div></div>
        <div class="pui-item" id="pui4" onclick="togglePui(4)"><div class="pui-box">✓</div><div class="pui-label">④ 매매계약서</div></div>
        <div class="pui-item" id="pui5" onclick="togglePui(5)"><div class="pui-box">✓</div><div class="pui-label">⑤ 계약파일관리</div></div>
      </div>
      <div class="pui-footer">
        <div class="pui-status" id="puiStatus">0 / 5 완료</div>
      </div>
    </div>
  </div>

  <!-- ③ 등록비 판정 -->
  <div class="card">
    <div class="card-head">
      <span class="icon">🧮</span><span class="label">등록비 판정</span>
    </div>
    <div class="card-body">
      <div class="grid grid-3" style="margin-bottom:14px">
        <div class="field">
          <label>판매가격(세금계산서 표시금액)</label>
          <input type="text" id="salePrice" class="num" oninput="fmtInput(this)" onblur="fmtInput(this)">
        </div>
        <div class="field">
          <label>입금계</label>
          <input type="text" id="deposit" class="num" oninput="fmtInput(this)" onblur="fmtInput(this)">
        </div>
        <div class="field">
          <label>탁송료</label>
          <input type="text" id="dlvPee" class="num" oninput="fmtInput(this)" onblur="fmtInput(this)">
        </div>
      </div>

      <div class="result-panel" id="resultPanel">
        <div class="result-top">
          <div class="result-icon" id="rIcon"></div>
          <div>
            <div class="result-title" id="rTitle"></div>
            <div style="font-size:11px;color:var(--gray3);margin-top:2px" id="rSub"></div>
          </div>
        </div>
        <div class="result-grid">
          <div class="result-item"><div class="r-label">등록비</div><div class="r-value" id="rRegFee">—</div></div>
          <div class="result-item"><div class="r-label">실 등록비(예상)</div><div class="r-value" id="rExpFee">—</div></div>
          <div class="result-item"><div class="r-label">차액</div><div class="r-value" id="rDiff">—</div></div>
        </div>
        <div class="confirm-area" id="confirmArea">
          <div class="c-label">⚠️ 등록비 1,000만원 초과 — 결재 컨펌 정보 (선택 입력)</div>
          <div class="confirm-row">
            <div class="field">
              <label>컨펌 구분</label>
              <div class="sel-wrap"><select id="confirmType"><option value="">선택</option><option>지점장 컨펌</option><option>본부장 컨펌</option><option>기타</option></select></div>
            </div>
            <div class="field"><label>컨펌자 이름</label><input type="text" id="confirmName"></div>
            <div class="field"><label>컨펌 일시</label><input type="datetime-local" id="confirmDt"></div>
          </div>
          <textarea class="confirm-note" id="confirmNote" placeholder="컨펌 사유 / 특이사항"></textarea>
        </div>
      </div>

      <div class="btn-area">
        <button class="btn btn-reset" onclick="resetForm()">↺ 초기화</button>
        <button class="btn btn-calc"  onclick="calcFee()">🧮 등록비 판정</button>
      </div>

      <!-- 매출 신청 영역 (조건 충족 시 표시) -->
      <div class="submit-area" id="submitArea">
        <div class="submit-inner">
          <div class="submit-guide" id="submitGuide"></div>
          <button class="btn btn-ok" id="btnSubmit" onclick="submitRequest()" disabled>✅ 매출 신청하기</button>
        </div>
        <div class="submit-hint">제출 시 구글시트에 자동 기록되고 매출담당자에게 알림이 발송됩니다.</div>
      </div>
    </div>
  </div>

</div>

<!-- 성공 오버레이 -->
<div class="success-overlay" id="successOverlay">
  <div class="success-box">
    <div class="success-icon"  id="sucIcon">✅</div>
    <div class="success-title" id="sucTitle">완료</div>
    <div class="success-info"  id="sucInfo"></div>
    <div class="success-sub"   id="sucSub"></div>
    <button class="btn-close-ok" onclick="closeSuccess()">확인 · 새 건 입력</button>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   설정
══════════════════════════════════════ */
// ※ Apps Script 웹앱 URL로 교체하세요
const SHEET_URL = 'https://script.google.com/macros/s/AKfycby69vW9Kmv6jXiTpQaHRXlOoRvAC06XJ-sYzhmKqrD2a1SWyMrG2hDl8u3EpgFRLRi-mw/exec';

/* ══════════════════════════════════════
   날짜
══════════════════════════════════════ */
const now = new Date();
document.getElementById('hdrDate').innerHTML =
  now.getFullYear()+'.'+String(now.getMonth()+1).padStart(2,'0')+'.'+String(now.getDate()).padStart(2,'0')+
  ' ('+['일','월','화','수','목','금','토'][now.getDay()]+')<br><span style="font-size:10px">영업관리 전용</span>';
document.getElementById('confirmDt').value =
  now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+
  'T'+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');

/* ══════════════════════════════════════
   숫자 포맷
══════════════════════════════════════ */
const rawNum = v => { const n=Number(String(v).replace(/,/g,'')); return isNaN(n)?0:n; };
const fmtN   = n => Math.round(n).toLocaleString('ko-KR');
function fmtInput(el) {
  const raw = String(el.value).replace(/,/g,'').replace(/[^0-9.-]/g,'');
  if(raw===''||raw==='-') return;
  const n = Number(raw);
  if(!isNaN(n)) el.value = fmtN(n);
}

/* ══════════════════════════════════════
   공백 자동 제거 (계약번호·SC·차대번호)
══════════════════════════════════════ */
['contractNo','sc','vin'].forEach(id => {
  const el = document.getElementById(id);
  if(!el) return;
  const strip = () => { el.value = el.value.replace(/\s/g,''); };
  el.addEventListener('input', strip);
  el.addEventListener('paste', () => setTimeout(strip,0));
  el.addEventListener('blur',  strip);
});

/* ══════════════════════════════════════
   계약 정보 입력 감지 → 버튼 활성화
   조건: 6개 필드 모두 채워짐
══════════════════════════════════════ */
const CONTRACT_FIELDS = ['contractNo','sc','customer','model','vin','finType'];

function isContractFilled() {
  return CONTRACT_FIELDS.every(id => {
    const el = document.getElementById(id);
    return el && el.value.trim() !== '' && el.value !== '';
  });
}

function checkContractFilled() {
  const filled = isContractFilled();
  document.getElementById('btnReg').disabled = !filled;
  document.getElementById('btnIF').disabled  = !filled;
  document.getElementById('contractHint').textContent = filled
    ? '계약 등록 또는 IF 결재 요청을 진행하세요.'
    : '모든 항목 입력 시 버튼이 활성화됩니다.';
  updateSubmitBtn();
}

/* ══════════════════════════════════════
   계약번호 입력 → 구글시트에서 자동 조회
══════════════════════════════════════ */
let autoFillTimer = null;

function onContractInput() {
  checkContractFilled();
  clearTimeout(autoFillTimer);
  const no = document.getElementById('contractNo').value.trim();
  if(!no || no.length < 4 || !SHEET_URL) return;

  autoFillTimer = setTimeout(() => {
    fetchContractFromSheet(no);
  }, 600); // 600ms 디바운스
}

function fetchContractFromSheet(contractNo) {
  const url = SHEET_URL + '?action=lookup&contractNo=' + encodeURIComponent(contractNo);
  fetch(url)
    .then(r => r.json())
    .then(data => {
      if(!data || !data.found) return;
      // 불러오기
      const map = {
        sc:       data.SC       || '',
        customer: data.고객명   || '',
        model:    data.모델     || '',
        vin:      data.차대번호 || '',
      };
      Object.entries(map).forEach(([id, val]) => {
        const el = document.getElementById(id);
        if(el && val) el.value = val;
      });
      // 금융 구분 선택
      if(data.금융구분) {
        const sel = document.getElementById('finType');
        [...sel.options].forEach(o => { if(o.text === data.금융구분) sel.value = o.value; });
      }
      document.getElementById('autofillBadge').style.display = 'block';
      checkContractFilled();
    })
    .catch(() => {}); // 조회 실패 시 무시
}

/* ══════════════════════════════════════
   품의 진행 체크박스
══════════════════════════════════════ */
const PUI_IDS = [1,2,3,4,5];
const PUI_REQ = [1,2,3,4]; // 매출 신청 필수

function togglePui(n) {
  document.getElementById('pui'+n).classList.toggle('checked');
  updatePuiStatus();
  updateSubmitBtn();
}
function isPuiChecked(n) { return document.getElementById('pui'+n).classList.contains('checked'); }
function isPuiReqDone()  { return PUI_REQ.every(n => isPuiChecked(n)); }
function getPuiState() {
  const labels = ['입금','홀세일','PDI','매매계약서','계약파일관리'];
  return PUI_IDS.map((n,i) => (isPuiChecked(n)?'✅':'□')+' '+labels[i]).join(' | ');
}
function updatePuiStatus() {
  const done   = PUI_IDS.filter(n => isPuiChecked(n)).length;
  const reqOk  = isPuiReqDone();
  const st     = document.getElementById('puiStatus');
  st.textContent = done+' / 5 완료'+(reqOk ? ' ✅' : '');
  st.className   = 'pui-status'+(reqOk ? ' ready' : '');
}

/* ══════════════════════════════════════
   매출 신청 버튼 활성화 조건 통합
   : 계약정보 완료 + 품의①~④ + 판정 완료
══════════════════════════════════════ */
let judged = false, currentJudge = null;

function updateSubmitBtn() {
  const btn = document.getElementById('btnSubmit');
  if(!btn) return;
  const ok = isContractFilled() && isPuiReqDone() && judged;
  btn.disabled = !ok;
}

/* ══════════════════════════════════════
   계약 등록 (계약 정보만 저장)
══════════════════════════════════════ */
function registerContract() {
  if(!isContractFilled()) { alert('계약 정보를 모두 입력해주세요.'); return; }
  const payload = {
    구분:     '계약등록',
    등록일시: new Date().toLocaleString('ko-KR'),
    계약번호: v('contractNo'), SC: v('sc'), 고객명: v('customer'),
    모델:     v('model'),     차대번호: v('vin'), 금융구분: v('finType'),
  };
  sendData(payload, 'reg');
}

/* ══════════════════════════════════════
   IF 결재 요청
══════════════════════════════════════ */
function requestIF() {
  if(!isContractFilled()) { alert('계약 정보를 모두 입력해주세요.'); return; }
  const payload = {
    구분:     'IF결재요청',
    요청일시: new Date().toLocaleString('ko-KR'),
    계약번호: v('contractNo'), SC: v('sc'), 고객명: v('customer'),
    모델:     v('model'),     차대번호: v('vin'), 금융구분: v('finType'),
    품의진행: getPuiState(),
  };
  sendData(payload, 'if');
}

/* ══════════════════════════════════════
   등록비 판정
══════════════════════════════════════ */
function calcFee() {
  const sp  = rawNum(v('salePrice'));
  const dep = rawNum(v('deposit'));
  const dlv = rawNum(v('dlvPee'));
  if(!sp||!dep) { alert('판매가격(세금계산서 표시금액)과 입금계를 입력해주세요.'); return; }

  const regFee = dep-dlv-sp, expFee = sp*0.1, diff = regFee-expFee;
  const isOver = regFee >= 10000000;
  currentJudge = isOver?'over':'ok'; judged = true;

  const panel = document.getElementById('resultPanel');
  panel.className = 'result-panel '+(isOver?'over':'ok');
  panel.style.display = 'block';

  document.getElementById('rIcon').textContent  = isOver?'🚨':'✅';
  document.getElementById('rTitle').textContent = isOver?'등록비 1,000만원 초과 — 구글시트에서 컨펌 확인 필요':'정상 — 매출 신청 가능';
  document.getElementById('rSub').textContent   = isOver?'매출 신청 후 구글시트에 초과 건으로 기록됩니다.':'등록비가 기준 이내입니다.';

  const regEl = document.getElementById('rRegFee');
  regEl.textContent = fmtN(regFee)+'원'; regEl.className = 'r-value '+(isOver?'red':'ok');
  document.getElementById('rExpFee').textContent = fmtN(expFee)+'원';
  const diffEl = document.getElementById('rDiff');
  diffEl.textContent = (diff>=0?'+':'')+fmtN(diff)+'원'; diffEl.className='r-value '+(diff>=0?'red':'ok');
  document.getElementById('confirmArea').style.display = isOver?'block':'none';

  const submitArea = document.getElementById('submitArea');
  submitArea.style.display = 'block';

  const btn = document.getElementById('btnSubmit');
  btn.className = isOver?'btn btn-over':'btn btn-ok';
  btn.innerHTML = isOver?'🚨 매출 신청하기 (초과 건)':'✅ 매출 신청하기';

  document.getElementById('submitGuide').textContent = isOver
    ? '🚨 등록비 초과 건 — 신청 후 구글시트에서 컨펌 처리됩니다.'
    : '✅ 등록비 정상';

  updateSubmitBtn();
  setTimeout(()=>submitArea.scrollIntoView({behavior:'smooth',block:'nearest'}),150);
}

/* ══════════════════════════════════════
   매출 신청 제출
══════════════════════════════════════ */
function submitRequest() {
  const sp=rawNum(v('salePrice')), dep=rawNum(v('deposit')), dlv=rawNum(v('dlvPee'));
  const regFee=dep-dlv-sp, expFee=sp*0.1, diff=regFee-expFee;
  const isOver = currentJudge==='over';
  const payload = {
    구분:           '매출신청',
    등록비초과여부: isOver?'🚨 초과':'',
    신청일시:       new Date().toLocaleString('ko-KR'),
    계약번호:       v('contractNo'), SC:v('sc'), 고객명:v('customer'),
    모델:           v('model'),      차대번호:v('vin'), 금융구분:v('finType'),
    판매가격:       sp, 입금계:dep, 탁송료:dlv,
    등록비:         regFee, 실등록비예상:expFee, 차액:diff,
    판정:           isOver?'초과':'정상',
    품의진행:       getPuiState(),
    컨펌구분:       v('confirmType'), 컨펌자:v('confirmName'),
    컨펌일시:       v('confirmDt'),   컨펌사유:v('confirmNote'),
  };
  sendData(payload, 'submit');
}

/* ══════════════════════════════════════
   구글시트 전송 공통
══════════════════════════════════════ */
const v = id => { const el=document.getElementById(id); return el?el.value:''; };

function sendData(data, type) {
  const btnMap   = { submit:'btnSubmit', if:'btnIF', reg:'btnReg' };
  const labelMap = { if:'📋 IF 결재 요청', reg:'💾 계약 등록' };
  const btn = document.getElementById(btnMap[type]);
  if(btn){ btn.disabled=true; btn.textContent='전송 중...'; }

  const restore = success => {
    if(btn){
      btn.disabled = (type==='submit') ? !(isContractFilled()&&isPuiReqDone()&&judged) : !isContractFilled();
      if(labelMap[type]) btn.innerHTML = labelMap[type];
      if(type==='submit'){
        btn.className = currentJudge==='over'?'btn btn-over':'btn btn-ok';
        btn.innerHTML = currentJudge==='over'?'🚨 매출 신청하기 (초과 건)':'✅ 매출 신청하기';
      }
    }
    showSuccessBox(type, data, success);
  };

  if(!SHEET_URL){ console.log('[전송]',data); restore(false); return; }

  // GET 방식으로 전송 (CORS 문제 없음)
  const url = SHEET_URL + '?action=write&payload=' + encodeURIComponent(JSON.stringify(data));
  fetch(url, { method:'GET', mode:'cors' })
    .then(r => r.json())
    .then(res => restore(res.result === 'ok'))
    .catch(() => restore(false));
}

/* ══════════════════════════════════════
   성공 팝업
══════════════════════════════════════ */
const SUCCESS_CONFIG = {
  reg:    { icon:'💾', title:'계약 등록 완료',       color:'var(--reg)' },
  if:     { icon:'📋', title:'IF 결재 요청 완료',    color:'var(--if)'  },
  submit: { icon:'✅', title:'매출 신청 완료',        color:'var(--ok)'  },
  submitOver: { icon:'🚨', title:'매출 신청 접수 (초과 건)', color:'var(--red)' },
};

function showSuccessBox(type, data, linked) {
  const isOver = data.판정==='초과';
  const cfg = (type==='submit'&&isOver) ? SUCCESS_CONFIG.submitOver : SUCCESS_CONFIG[type];
  document.getElementById('sucIcon').textContent  = cfg.icon;
  document.getElementById('sucTitle').textContent = cfg.title;
  document.getElementById('sucTitle').style.color = cfg.color;

  let infoHtml = `계약번호: <span>${data.계약번호||v('contractNo')}</span><br>고객명: <span>${data.고객명||v('customer')}</span><br>`;
  if(type==='submit') infoHtml += `등록비: <span>${fmtN(data.등록비)}원</span><br>판정: <span>${isOver?'🚨 초과':'✅ 정상'}</span><br>`;
  infoHtml += `일시: <span>${data.신청일시||data.요청일시||data.등록일시}</span>`;
  document.getElementById('sucInfo').innerHTML = infoHtml;
  document.getElementById('sucSub').textContent = linked
    ? '구글시트에 자동 기록되었습니다.'
    : '(구글시트 미연동 — 연동 설정 후 자동 기록됩니다.)';
  document.getElementById('successOverlay').classList.add('show');
}

function closeSuccess() {
  document.getElementById('successOverlay').classList.remove('show');
  document.getElementById('sucTitle').style.color = '';
  resetForm();
}

/* ══════════════════════════════════════
   초기화
══════════════════════════════════════ */
function resetForm() {
  ['contractNo','sc','customer','model','vin','salePrice','deposit','dlvPee','confirmName','confirmNote'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  ['finType','confirmType'].forEach(id=>{ const el=document.getElementById(id); if(el) el.selectedIndex=0; });
  PUI_IDS.forEach(n=>document.getElementById('pui'+n).classList.remove('checked'));
  judged=false; currentJudge=null;
  document.getElementById('autofillBadge').style.display='none';
  document.getElementById('resultPanel').style.display='none';
  document.getElementById('submitArea').style.display='none';
  document.getElementById('confirmArea').style.display='none';
  updatePuiStatus(); checkContractFilled();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ══════════════════════════════════════
   초기 상태
══════════════════════════════════════ */
if(SHEET_URL) document.getElementById('gsNotice').style.display='none';
updatePuiStatus();
checkContractFilled();
</script>
